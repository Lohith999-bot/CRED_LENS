<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<form action="/predict" method="post">
<div class="form-container">

  <label>Income:
    <input type="number" id="income" name="income" oninput="calculateRatios()">
  </label>

  <label>Age:
    <input type="number" name="age">
  </label>

  <label>Loan:
    <input type="number" id="loan_required" name="loan_required" oninput="calculateRatios()">
  </label>

  <label>Existing Loan:
    <input type="number" id="existing_total_loan" name="existing_total_loan" oninput="calculateRatios()">
  </label>

  <label>Remaining EMI (Tenure in months):
    <input type="number" id="tenure" name="tenure" oninput="calculateRatios()">
  </label>

  <label>Credit Score:
    <input type="number" name="credit_score">
  </label>

  <label>Previous Default (0 or 1):
    <input type="number" name="previous_default">
  </label>

  <label>Existing Loan Count:
    <input type="number" name="existing_loans">
  </label>

  <p>Loan to Income Ratio: <span id="lti">0</span></p>
  <p>EMI to Income Ratio: <span id="eti">0</span></p>
  <p>Debt to Income Ratio: <span id="dti">0</span></p>

  <!-- FIXED BUTTON -->
  <button type="submit" class="submit-btn">SUBMIT</button>

</div>
</form>

<!-- 🔥 JavaScript for auto calculation -->
<script>
function calculateRatios() {
    let income = parseFloat(document.getElementById("income").value) || 0;
    let loan = parseFloat(document.getElementById("loan_required").value) || 0;
    let existing = parseFloat(document.getElementById("existing_total_loan").value) || 0;
    let tenure = parseFloat(document.getElementById("tenure").value) || 1;

    if (income > 0 && tenure > 0) {

        let emi = loan / tenure;
        let existingEmi = existing / tenure;

        let lti = loan / income;
        let eti = emi / income;
        let dti = (emi + existingEmi) / income;

        document.getElementById("lti").innerText = lti.toFixed(2);
        document.getElementById("eti").innerText = eti.toFixed(2);
        document.getElementById("dti").innerText = dti.toFixed(2);

    } else {
        document.getElementById("lti").innerText = "0";
        document.getElementById("eti").innerText = "0";
        document.getElementById("dti").innerText = "0";
    }
}
</script>

</body>
</html>
